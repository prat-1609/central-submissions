# A generic, single database configuration.

[alembic]
# path to migration scripts — now relative to this file's location
script_location = %(here)s

# sys.path path, will be prepended to sys.path if present.
# Points to the project root so `database.*` imports work.
prepend_sys_path = ../..

# Use os.pathsep. Default configuration used for new projects.
path_separator = os

# database URL. This is overridden by env.py at runtime.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
